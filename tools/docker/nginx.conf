# nginx reverse-proxy config for production (mounted as /etc/nginx/conf.d/default.conf).
#
# Routes:
#   /                    -> static frontend (served via Vite/electron build artifacts)
#   /api/                -> backend FastAPI service (port 8000)
#   /ws/                 -> WebSocket pass-through for live progress + lipsync
#   /health              -> backend health probe (used by Docker health checks)
#   /metrics             -> Prometheus scrape (port 8000, allow only internal)
#
# TLS: certs expected at /etc/nginx/ssl/{cert.pem,key.pem}. The repo ships
# self-signed placeholders at tools/docker/ssl/ for local prod-compose smoke;
# replace at deploy time with real certs from your CA or Let's Encrypt.

upstream backend {
    server backend:8000;
    keepalive 32;
}

# HTTP → HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Allow ACME http-01 challenge for Let's Encrypt; everything else → HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Backend API + SSE/WebSocket.
    location /api/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 100M;
    }

    location /ws/ {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    location /health {
        proxy_pass http://backend/health;
        access_log off;
    }

    # Restrict /metrics to internal network. Adjust the CIDR for your deploy.
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass http://backend/metrics;
    }

    # Anything else → static index from the frontend build.
    location / {
        root  /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}

# WebSocket upgrade helper.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}
