# SceneMachine Docker Compose — Production
# Multi-service deployment with GPU support, monitoring, and hardened configuration
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml --profile monitoring up -d
#   docker compose -f docker-compose.prod.yml --profile gpu up -d

version: '3.8'

services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: scenemachine-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-scenemachine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Redis (caching + job queues)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: scenemachine-redis
    command: >
      redis-server
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Backend API Server
  # ──────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: tools/docker/Dockerfile.backend
      args:
        PYTHON_VERSION: "3.11"
    container_name: scenemachine-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-scenemachine}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SCENEMACHINE_ENV: production
      SCENEMACHINE_SECRET_KEY: ${SCENEMACHINE_SECRET_KEY}
      SCENEMACHINE_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://scenemachine.app}
      # API Keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      REPLICATE_API_KEY: ${REPLICATE_API_KEY:-}
      # Performance
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      MAX_CONNECTIONS: ${MAX_CONNECTIONS:-20}
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - cache:/app/cache
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Celery Worker (background tasks)
  # ──────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: tools/docker/Dockerfile.backend
    container_name: scenemachine-worker
    command: ["celery", "-A", "scenemachine.tasks", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-scenemachine}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SCENEMACHINE_ENV: production
      SCENEMACHINE_SECRET_KEY: ${SCENEMACHINE_SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      REPLICATE_API_KEY: ${REPLICATE_API_KEY:-}
    volumes:
      - uploads:/app/uploads
      - outputs:/app/outputs
      - cache:/app/cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Database Migrations (run once)
  # ──────────────────────────────────────────────
  migrations:
    build:
      context: .
      dockerfile: tools/docker/Dockerfile.backend
    container_name: scenemachine-migrations
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-scenemachine}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: scenemachine-nginx
    volumes:
      - ./tools/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tools/docker/ssl:/etc/nginx/ssl:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Prometheus (monitoring) — opt-in profile
  # ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: scenemachine-prometheus
    profiles: ["monitoring"]
    volumes:
      - ./tools/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    restart: always
    networks:
      - backend

  # ──────────────────────────────────────────────
  # Grafana (dashboards) — opt-in profile
  # ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: scenemachine-grafana
    profiles: ["monitoring"]
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    restart: always
    networks:
      - backend

volumes:
  postgres_data:
    name: scenemachine_prod_postgres
  redis_data:
    name: scenemachine_prod_redis
  uploads:
    name: scenemachine_prod_uploads
  outputs:
    name: scenemachine_prod_outputs
  cache:
    name: scenemachine_prod_cache
  prometheus_data:
    name: scenemachine_prod_prometheus
  grafana_data:
    name: scenemachine_prod_grafana

networks:
  backend:
    name: scenemachine_prod_network
    driver: bridge
