# SceneMachine Network - NGINX API Gateway Configuration

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

    # Upstream definitions
    upstream auth_service {
        server auth-service:8001;
        keepalive 32;
    }

    upstream content_service {
        server content-service:8002;
        keepalive 32;
    }

    upstream streaming_service {
        server streaming-service:8003;
        keepalive 32;
    }

    upstream social_service {
        server social-service:8004;
        keepalive 32;
    }

    upstream discovery_service {
        server discovery-service:8005;
        keepalive 32;
    }

    upstream monetization_service {
        server monetization-service:8006;
        keepalive 32;
    }

    upstream analytics_service {
        server analytics-service:8007;
        keepalive 32;
    }

    upstream studio_service {
        server studio-service:8008;
        keepalive 32;
    }

    upstream moderation_service {
        server moderation-service:8009;
        keepalive 32;
    }

    upstream distribution_service {
        server distribution-service:8010;
        keepalive 32;
    }

    upstream events_service {
        server events-service:8011;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # =======================================================================
        # AUTH SERVICE - /api/auth/*
        # =======================================================================
        location /api/auth/ {
            limit_req zone=auth_limit burst=20 nodelay;

            proxy_pass http://auth_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # =======================================================================
        # CONTENT SERVICE - /api/videos/*, /api/upload/*
        # =======================================================================
        location /api/videos/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://content_service/videos/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/upload/ {
            limit_req zone=upload_limit burst=10 nodelay;

            client_max_body_size 10G;
            client_body_timeout 600s;

            proxy_pass http://content_service/upload/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
        }

        # =======================================================================
        # STREAMING SERVICE - /api/stream/*
        # =======================================================================
        location /api/stream/ {
            proxy_pass http://streaming_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Disable buffering for streaming
            proxy_buffering off;
            proxy_cache off;

            # Long timeout for video segments
            proxy_read_timeout 300s;
        }

        # HLS manifest and segments
        location ~* \.(m3u8|ts|mpd|m4s)$ {
            proxy_pass http://streaming_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # Cache manifests briefly, segments longer
            proxy_cache_valid 200 1s;
            add_header Cache-Control "public, max-age=2";
        }

        # =======================================================================
        # SOCIAL SERVICE - /api/social/*
        # =======================================================================
        location /api/social/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://social_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # WebSocket for real-time updates
        location /api/social/ws {
            proxy_pass http://social_service/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # =======================================================================
        # DISCOVERY SERVICE - /api/discover/*, /api/search/*
        # =======================================================================
        location /api/discover/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://discovery_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/search/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://discovery_service/search/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # =======================================================================
        # MONETIZATION SERVICE - /api/monetization/*
        # =======================================================================
        location /api/monetization/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://monetization_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Stripe webhooks - no rate limit, signature verified by service
        location /api/webhooks/stripe {
            proxy_pass http://monetization_service/webhooks/stripe;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Stripe-Signature $http_stripe_signature;
        }

        # =======================================================================
        # ANALYTICS SERVICE - /api/analytics/*
        # =======================================================================
        location /api/analytics/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://analytics_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # =======================================================================
        # STUDIO SERVICE - /api/studio/*
        # =======================================================================
        location /api/studio/ {
            limit_req zone=api_limit burst=20 nodelay;

            client_max_body_size 10G;

            proxy_pass http://studio_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # =======================================================================
        # MODERATION SERVICE - /api/moderation/* (Admin only)
        # =======================================================================
        location /api/moderation/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://moderation_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # =======================================================================
        # DISTRIBUTION SERVICE - /api/distribution/* (StoryHeaven & MovieHeaven)
        # =======================================================================
        location /api/story-heaven/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://distribution_service/story-heaven/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/movie-heaven/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://distribution_service/movie-heaven/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/festivals/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://distribution_service/festivals/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/exports/ {
            limit_req zone=api_limit burst=20 nodelay;

            client_max_body_size 10G;

            proxy_pass http://distribution_service/exports/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }

        # =======================================================================
        # EVENTS SERVICE - /api/events/* (CoreCast, Badges, Performers Association)
        # =======================================================================
        location /api/corecast/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://events_service/corecast/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/badges/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://events_service/badges/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        location /api/performers-association/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://events_service/performers-association/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # =======================================================================
        # ERROR PAGES
        # =======================================================================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
