apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scenemachine

resources:
  - ../../base
  - resources.yaml

labels:
  - pairs:
      environment: production

replicas:
  - name: backend
    count: 3

patches:
  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 100Gi
    target:
      kind: PersistentVolumeClaim
      name: scenemachine-uploads
  - patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 500Gi
    target:
      kind: PersistentVolumeClaim
      name: scenemachine-outputs
  - patch: |-
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 100Gi
    target:
      kind: StatefulSet
      name: postgres
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi
    target:
      kind: Deployment
      name: backend
  - patch: |-
      - op: replace
        path: /spec/tls/0/hosts/0
        value: api.scenemachine.io
      - op: replace
        path: /spec/rules/0/host
        value: api.scenemachine.io
    target:
      kind: Ingress
      name: scenemachine-ingress

configMapGenerator:
  - name: scenemachine-config
    behavior: merge
    literals:
      - LOG_LEVEL=INFO
      - ENABLE_ANALYTICS=true
      - ENABLE_SHARING=true
      - ENABLE_AUDIO=true
      - ENABLE_LIPSYNC=true

images:
  - name: scenemachine/backend
    newTag: v1.0.0
