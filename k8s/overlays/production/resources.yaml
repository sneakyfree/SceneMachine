# Production resource limits and requests
apiVersion: v1
kind: LimitRange
metadata:
  name: scenemachine-limits
  namespace: scenemachine
spec:
  limits:
    - default:
        cpu: "1"
        memory: 2Gi
      defaultRequest:
        cpu: "250m"
        memory: 512Mi
      type: Container
    - max:
        storage: 1Ti
      type: PersistentVolumeClaim
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: scenemachine-quota
  namespace: scenemachine
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    persistentvolumeclaims: "20"
    pods: "50"
    services: "20"
