# NOTE: In production, use External Secrets Operator, Sealed Secrets,
# or a secrets management solution like HashiCorp Vault.
# This file is a template - actual secrets should NEVER be committed.

apiVersion: v1
kind: Secret
metadata:
  name: scenemachine-secrets
  namespace: scenemachine
  labels:
    app.kubernetes.io/name: scenemachine
type: Opaque
stringData:
  # Database password - REPLACE IN PRODUCTION
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"

  # Application secret key - REPLACE IN PRODUCTION
  SCENEMACHINE_SECRET_KEY: "${SCENEMACHINE_SECRET_KEY}"

  # JWT secrets
  JWT_SECRET_KEY: "${JWT_SECRET_KEY}"

  # API Keys - Set via environment or secrets manager
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  OPENAI_API_KEY: "${OPENAI_API_KEY}"
  ELEVENLABS_API_KEY: "${ELEVENLABS_API_KEY}"
  REPLICATE_API_KEY: "${REPLICATE_API_KEY}"
  FAL_API_KEY: "${FAL_API_KEY}"
  RUNPOD_API_KEY: "${RUNPOD_API_KEY}"
---
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: scenemachine
  labels:
    app.kubernetes.io/name: scenemachine
    app.kubernetes.io/component: database
type: Opaque
stringData:
  # Connection URL - REPLACE IN PRODUCTION
  DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-service:5432/${POSTGRES_DB}"
