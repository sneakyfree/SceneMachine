apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: scenemachine

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/version: "1.0.0"

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - pvc.yaml
  - postgres-statefulset.yaml
  - redis-deployment.yaml
  - backend-deployment.yaml
  - ingress.yaml
  - hpa.yaml
  - backup-cronjob.yaml

commonLabels:
  app.kubernetes.io/part-of: scenemachine

images:
  - name: scenemachine/backend
    newTag: latest
  - name: postgres
    newName: postgres
    newTag: 15-alpine
  - name: redis
    newName: redis
    newTag: 7-alpine
